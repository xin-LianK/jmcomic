services:
  jmcomic-visual:
    build:
      context: .
    image: jmcomic-visual:local
    container_name: jmcomic-visual
    ports:
      - "8088:8088"
    environment:
      JM_VISUAL_DOWNLOAD_DIR: /data/downloads
      JM_VISUAL_CACHE_DIR: /data/cache
      # Optional: mount your own jmcomic option file and enable this.
      # JM_OPTION_PATH: /config/option.yml
    volumes:
      - ./downloads:/data/downloads
      - ./.cache:/data/cache
      # - ./option.yml:/config/option.yml:ro
    restart: unless-stopped
